version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: psn_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: psn_db
    ports:
      - "5432:5432"
    volumes:
      - psn_pgdata:/var/lib/postgresql/data

volumes:
  psn_pgdata: